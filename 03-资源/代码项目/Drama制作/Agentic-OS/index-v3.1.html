<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic OS v3.1 指挥中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;color:#f1f5f9;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:28px;color:#38bdf8}
.project-switcher{margin-left:auto}
.project-switcher select{padding:8px 16px;border-radius:8px;background:#1e293b;color:#fff;border:1px solid #334155;font-size:14px}
.header-actions{display:flex;align-items:center;gap:12px;margin-left:auto}
.dashboard-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px;transition:all .2s}
.dashboard-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(99,102,241,0.4)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px}
.kpi-card{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;border:2px solid #334155;cursor:pointer;transition:all .2s}
.kpi-card:hover{background:rgba(56,189,248,0.1)}
.kpi-card.active{border-color:#38bdf8;box-shadow:0 0 15px rgba(56,189,248,0.3)}
.kpi-card .label{color:#94a3b8;font-size:14px;margin-bottom:8px}
.kpi-card .value{font-size:36px;font-weight:bold}
.kpi-card .value.green{color:#4ade80}
.kpi-card .value.yellow{color:#facc15}
.kpi-card .value.red{color:#f87171}
.filter-bar{display:flex;align-items:center;margin-bottom:16px}
.filter-tag{background:#38bdf8;color:#0f172a;padding:4px 12px;border-radius:20px;font-size:14px}
.filter-tag .clear{cursor:pointer;font-weight:bold;margin-left:8px}
.section-title{font-size:20px;margin:24px 0 16px;color:#cbd5e1}
.task-list{background:rgba(0,0,0,0.2);border-radius:16px;overflow:hidden;border:1px solid #334155}
.task-item{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid #334155;cursor:pointer}
.task-item:hover{background:rgba(56,189,248,0.1)}
.task-status{width:12px;height:12px;border-radius:50%;margin-right:16px}
.task-status.running{background:#38bdf8;animation:pulse 2s infinite}
.task-status.completed{background:#4ade80}
.task-status.pending{background:#facc15}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.task-info{flex:1}
.task-info .title{font-weight:600}
.task-info .meta{font-size:12px;color:#94a3b8}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#1e293b;border-radius:20px;padding:30px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid #38bdf8}
.close{float:right;cursor:pointer;font-size:24px;color:#94a3b8}
.milestone-item{padding:10px;border-bottom:1px solid #334155;display:flex;align-items:center}
.milestone-status{margin-left:auto;padding:2px 10px;border-radius:12px;font-size:12px;background:#334155;color:#fff}
.milestone-status.completed{background:#4ade80;color:#0f172a}
.milestone-status.running{background:#38bdf8;color:#0f172a}
.artifact-item{background:#0f172a;border-radius:8px;padding:12px;margin-bottom:10px}
.artifact-item .name{font-weight:600;color:#38bdf8}
.artifact-item .meta{font-size:12px;color:#64748b;margin-top:4px}
.artifact-link{color:#4ade80;text-decoration:none;margin-right:10px}
.artifact-link:hover{text-decoration:underline}
.artifact-preview{max-width:100%;height:auto;border-radius:8px;margin-top:8px}
.artifact-text{background:#0f172a;border-radius:8px;padding:12px;margin-top:8px;white-space:pre-wrap;overflow-x:auto;font-family:monospace;font-size:13px;line-height:1.5}
.milestone-status.pending{background:#64748b;color:#fff}
button{background:#38bdf8;color:#0f172a;border:none;padding:8px 20px;border-radius:8px;font-weight:600;cursor:pointer;margin-right:10px}
.loading{text-align:center;padding:40px;color:#64748b}
.empty-state{text-align:center;padding:40px;color:#64748b}
</style>
</head>
<body>
<div class="header"><a href="/" class="home-btn" style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:#1e293b;color:#fff;text-decoration:none;border-radius:8px;font-size:14px;margin-right:16px;border:1px solid #334155">🏠 首页</a><h1>🎯 Agentic OS v3.1 指挥中心</h1><div class="header-actions"><a href="http://localhost:5173/" target="_blank" class="dashboard-btn">📊 数据面板</a><div class="project-switcher"><select id="projectSelect"><option value="all">🌐 全局</option><option value="drama">🎬 短剧</option><option value="tk">🛒 TK</option></select></div></div></div>

<div class="kpi-grid">
<div class="kpi-card" data-filter="drama-running"><div class="label">📊 短剧进行中</div><div class="value yellow" id="dramaRunning">-</div></div>
<div class="kpi-card" data-filter="tk-running"><div class="label">🛒 TK运营中</div><div class="value green" id="tkRunning">-</div></div>
<div class="kpi-card" data-filter="pending-decisions"><div class="label">⚠️ 待决策</div><div class="value red" id="pendingDecisions">-</div></div>
<div class="kpi-card" data-filter="all"><div class="label">📋 总任务</div><div class="value" id="totalTasks">-</div></div>
</div>

<div class="filter-bar" id="filterBar" style="display:none">
<span class="filter-tag"><span id="filterLabel"></span><span class="clear" onclick="clearFilter()">✕</span></span>
</div>

<div class="section-title">📌 活跃任务</div>
<div id="taskList" class="task-list"><div class="loading">加载中...</div></div>

<div id="taskModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<h2 id="modalTitle"></h2>
<div id="modalBasicInfo" style="margin-bottom:20px;color:#94a3b8"></div>
<div id="modalMilestones"></div>
<div id="modalDecisions"></div>
<div id="modalArtifacts"></div>
</div>
</div>

<script>
const API_PORTS=[5001,5000,9090];
let API_BASE="",currentFilter="all",currentProject="all",allTasks=[];

async function detectApiPort(){
for(let p of API_PORTS){
try{let r=await fetch(`http://localhost:${p}/api/health`);if(r.ok){API_BASE=`http://localhost:${p}`;return true}}catch(e){}
}
return false;
}

async function fetchData(){
if(!API_BASE)return;
try{let r=await fetch(`${API_BASE}/api/dashboard?project=${currentProject}`),d=await r.json();allTasks=d.active_tasks||[];renderDashboard(d)}catch(e){document.getElementById("taskList").innerHTML="<div class='loading'>加载失败</div>"}
}

function renderDashboard(d){
const k=d.kpi||{},dr=k.drama||{running:0},tk=k.tk||{running:0};
document.getElementById("dramaRunning").textContent=dr.running||0;
document.getElementById("tkRunning").textContent=tk.running||0;
document.getElementById("pendingDecisions").textContent=d.pending_decisions||0;
document.getElementById("totalTasks").textContent=allTasks.length;
applyFilter();
}

function filterTasks(){
let f=allTasks;
// 项目过滤
if(currentProject!=="all")f=f.filter(t=>t.project_id===currentProject);
// KPI过滤
if(currentFilter==="drama-running")f=f.filter(t=>t.project_id==="drama"&&t.status==="running");
else if(currentFilter==="tk-running")f=f.filter(t=>t.project_id==="tk"&&t.status==="running");
else if(currentFilter==="pending-decisions")f=f.filter(t=>(t.decision_points||[]).some(d=>d.status==="pending"));
return f;
}

function applyFilter(){
const ft=filterTasks();
renderTaskList(ft);
updateActiveCard();
updateFilterLabel();
}

function renderTaskList(tasks){
const c=document.getElementById("taskList");
if(tasks.length===0){c.innerHTML="<div class='empty-state'>没有符合条件的任务</div>";return}
let h="";
tasks.forEach(t=>{
const sc=t.status||"pending";
const pd=(t.decision_points||[]).filter(d=>d.status==="pending").length;
const mt=(t.milestones||[]).length;
const mc=(t.milestones||[]).filter(m=>m.status==="completed").length;
const scIcon={"running":"🔵","completed":"🟢","pending":"🟡"}[sc];
const scColor={"running":"#38bdf8","completed":"#4ade80","pending":"#facc15"}[sc];
h+=`<div class="task-item" data-task-id="${t.id}"><div class="task-status ${sc}"></div><div class="task-info"><div class="title">${t.project_id==="drama"?"🎬":"🛒"} ${t.title} <span style="color:${scColor}">${scIcon} ${sc}</span></div><div class="meta">${t.id}${mt>0?" | 进度:"+mc+"/"+mt:""}${pd>0?" | ⚠️"+pd+"个待决策":""}</div></div></div>`;
});
c.innerHTML=h;
c.querySelectorAll(".task-item").forEach(el=>el.addEventListener("click",()=>showTaskDetail(el.dataset.taskId)));
}

function updateActiveCard(){
document.querySelectorAll(".kpi-card").forEach(c=>c.classList.remove("active"));
const a=document.querySelector(`.kpi-card[data-filter="${currentFilter}"]`);
if(a)a.classList.add("active");
}

function updateFilterLabel(){
const b=document.getElementById("filterBar"),l=document.getElementById("filterLabel");
const n={"all":"全部","drama-running":"短剧进行中","tk-running":"TK运营中","pending-decisions":"待决策"};
if(currentFilter!=="all"){b.style.display="flex";l.textContent="过滤: "+n[currentFilter]}else{b.style.display="none"}
}

function setFilter(f){currentFilter=f;applyFilter()}
function clearFilter(){setFilter("all")}

function showTaskDetail(tid){
const t=allTasks.find(x=>x.id===tid);
if(!t)return;
document.getElementById("modalTitle").textContent=t.title;
const stIcon={"running":"🔵","completed":"🟢","pending":"🟡","failed":"🔴"};
const stColor={"running":"#38bdf8","completed":"#4ade80","pending":"#facc15","failed":"#f87171"};
document.getElementById("modalBasicInfo").innerHTML=`<p><strong>项目:</strong>${t.project_id==="drama"?"🎬短剧":"🛒TK"} | <strong>状态:</strong><span style="color:${stColor[t.status]||"#fff"}">${stIcon[t.status]||""} ${t.status}</span></p><p><strong>描述:</strong>${t.description||"无"}</p>`;

const msDiv=document.getElementById("modalMilestones");
if(t.milestones&&t.milestones.length>0){
let h="<h3>📌 里程碑</h3>";
t.milestones.forEach(m=>{const ms=m.status||"pending",msIcon={"completed":"✅","running":"🔄","pending":"⏳"}[ms];h+=`<div class="milestone-item"><span>${m.name}</span><span class="milestone-status ${ms}">${msIcon} ${ms}</span></div>`});
msDiv.innerHTML=h;
}else{msDiv.innerHTML=""}

const dcDiv=document.getElementById("modalDecisions");
if(t.decision_points&&t.decision_points.length>0){
let h="<h3>🚨 决策点</h3>";
t.decision_points.forEach(d=>{
const opts=(d.options||[]).map(o=>`<button onclick="resolveDecision('${t.id}','${d.id}','${o}')">${o}</button>`).join("");
h+=`<div class="decision-card"><strong>${d.question}</strong><br><small>状态:${d.status}</small>${d.status==="pending"?`<div>${opts}</div>`:`<p>✅已选择:${d.resolution||"无"}</p>`}</div>`;
});
dcDiv.innerHTML=h;
}else{dcDiv.innerHTML=""}

// 产出物
const artDiv=document.getElementById("modalArtifacts");
if(t.artifacts&&t.artifacts.length>0){
let h="<h3>📦 产出物</h3>";
t.artifacts.forEach(a=>{const icon={"video":"🎬","script":"📄","data":"📊","image":"🖼️"}[a.type]||"📦";const isVideo=a.type==="video"||a.name.match(/\.(mp4|webm|mov)$/i);const isImage=a.type==="image"||a.name.match(/\.(jpg|jpeg|png|gif|webp)$/i);const isText=a.type==="script"||a.name.match(/\.(txt|md|json|xml|html)$/i);let preview="";if(isVideo)preview=`<div style="color:#f87171;font-size:12px;margin-top:8px">⚠️ 此为测试文件，无法播放。真实视频需运行短剧流水线生成。</div>`;else if(isImage)preview=`<img class="artifact-preview" src="${a.url}" alt="${a.name}"/>`;else if(isText&&a.content)preview=`<div class="artifact-text">${a.content}</div>`;h+=`<div class="artifact-item"><div class="name">${icon} ${a.name}</div><div class="meta">创建于: ${a.created_at?a.created_at.replace("T"," ").substring(0,19):"未知"}</div>${a.url?`<a href="${a.url}" class="artifact-link" download="true">📥 下载</a>`:""}}${preview}${a.path?`<div style="font-size:11px;color:#475569;margin-top:4px">📁 ${a.path}</div>`:""}</div>`});
artDiv.innerHTML=h;
}else{artDiv.innerHTML="<h3>📦 产出物</h3><p style='color:#64748b'>暂无产出物</p>"}

document.getElementById("taskModal").classList.add("active");
}

async function resolveDecision(tid,did,choice){
try{
await fetch(`${API_BASE}/api/decision/${tid}/${did}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({choice:choice})});
closeModal();
fetchData();
}catch(e){alert("提交失败")}
}

function closeModal(){document.getElementById("taskModal").classList.remove("active")}

document.querySelectorAll(".kpi-card").forEach(c=>c.addEventListener("click",()=>{if(c.dataset.filter)setFilter(c.dataset.filter)}));
document.getElementById("projectSelect").addEventListener("change",(e)=>{currentProject=e.target.value;fetchData()});

(async()=>{if(await detectApiPort()){await fetchData();setInterval(fetchData,30000)}})();
</script>
</body>
</html>
