<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 账号管理中心 - MagicPockets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .accounts-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .account-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .account-table th,
        .account-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .account-table th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-normal { background: #d4edda; color: #155724; }
        .status-warning { background: #fff3cd; color: #856404; }
        .status-danger { background: #f8d7da; color: #721c24; }
        
        .health-bar {
            width: 100px;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <div style="margin-bottom:15px"><a href="http://localhost:5002/tk-center.html" style="padding:8px 16px;background:rgba(255,255,255,0.2);border-radius:8px;color:white;text-decoration:none;font-size:14px">← 返回TK运营中心</a></div>
            <h1>🔐 账号管理中心</h1>
            <p>集中管理 TikTok 多账号、多国家配置，监控账号健康状态</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalAccounts">0</div>
                <div class="stat-label">总账号数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="healthyAccounts">0</div>
                <div class="stat-label">健康账号</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="warningAccounts">0</div>
                <div class="stat-label">警告账号</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="dangerAccounts">0</div>
                <div class="stat-label">异常账号</div>
            </div>
        </div>
        
        <!-- 搜索与过滤 -->
        <div class="accounts-section">
            <div class="section-header">
                <h2>🔍 搜索与过滤</h2>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="searchInput" placeholder="🔍 搜索账号..." 
                    style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;"
                    onkeyup="filterAccounts()">
                <select id="platformFilter" onchange="filterAccounts()"
                    style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">所有平台</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Shopee">Shopee</option>
                    <option value="Lazada">Lazada</option>
                </select>
                <select id="countryFilter" onchange="filterAccounts()"
                    style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">所有国家</option>
                    <option value="ID">🇮🇩 印尼</option>
                    <option value="PH">🇵🇭 菲律宾</option>
                    <option value="TH">🇹🇭 泰国</option>
                    <option value="VN">🇻🇳 越南</option>
                    <option value="MY">🇲🇾 马来西亚</option>
                </select>
                <select id="statusFilter" onchange="filterAccounts()"
                    style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">所有状态</option>
                    <option value="normal">✅ 正常</option>
                    <option value="warning">⚠️ 警告</option>
                    <option value="danger">❌ 异常</option>
                </select>
            </div>
        </div>
        
        <!-- 添加账号模态框 -->
        <div id="addAccountModal" style="display: none !important; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; max-width: 500px; margin: 100px auto; padding: 30px; border-radius: 12px;">
                <h3 style="margin-bottom: 20px;">➕ 添加账号</h3>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">账号名称 *</label>
                    <input type="text" id="addUsername" placeholder="@username" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">平台 *</label>
                    <select id="addPlatform" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="TikTok">TikTok</option>
                        <option value="Shopee">Shopee</option>
                        <option value="Lazada">Lazada</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">国家 *</label>
                    <select id="addCountry" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="TH">🇹🇭 泰国</option>
                        <option value="ID">🇮🇩 印尼</option>
                        <option value="PH">🇵🇭 菲律宾</option>
                        <option value="VN">🇻🇳 越南</option>
                        <option value="MY">🇲🇾 马来西亚</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">粉丝数</label>
                    <input type="number" id="addFollowers" placeholder="0" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmAddAccount()" style="flex: 1;">✅ 确认添加</button>
                    <button class="btn" onclick="closeAddAccountModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <!-- 批量导入模态框 -->
        <div id="importModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; max-width: 500px; margin: 100px auto; padding: 30px; border-radius: 12px;">
                <h3 style="margin-bottom: 20px;">📥 批量导入账号</h3>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">上传 CSV 文件</label>
                    <input type="file" id="importFile" accept=".csv,.xlsx,.xls" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    <p style="font-size: 12px; color: #666; margin-top: 5px;">CSV 格式：username,platform,country,followers</p>
                    <p style="font-size: 12px; color: #999;">示例：@kohcun,TikTok,ID,150000</p>
                </div>
                
                <div id="importResults" style="display: none; margin-bottom: 15px; padding: 15px; background: #f5f5f5; border-radius: 6px;">
                    <h4 style="margin-bottom: 10px;">导入结果：</h4>
                    <div id="importResultsContent"></div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmImport()" style="flex: 1;">✅ 确认导入</button>
                    <button class="btn" onclick="closeImportModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <!-- 账号列表 -->
        <div class="accounts-section">
            <div class="section-header">
                <h2>📋 账号列表</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="openImportModal()">📥 批量导入</button>
                    <button class="btn" onclick="exportAccounts()">📤 导出</button>
                    <button class="btn btn-primary" onclick="openAddAccountModal()">➕ 添加账号</button>
                </div>
            </div>
            
            <table class="account-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" onchange="toggleSelectAll(this)"></th>
                        <th>账号</th>
                        <th>平台</th>
                        <th>国家</th>
                        <th>粉丝数</th>
                        <th>健康度</th>
                        <th>状态</th>
                        <th>最后活跃</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="accountsTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            
            <!-- 批量操作栏 -->
            <div id="batchActions" style="display: none; margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                <strong>已选择 <span id="selectedCount">0</span> 个账号</strong>
                <button class="btn btn-primary" onclick="batchHealthCheck()">🔍 批量检查健康</button>
                <button class="btn" onclick="batchEdit()">✏️ 批量编辑</button>
                <button class="btn" onclick="batchDelete()">🗑️ 批量删除</button>
            </div>
        </div>
    </div>
    
    <!-- 引入数据库模块 -->
    <script src="js/database.js"></script>
    <script src="js/backend-integration.js"></script>
    
    <script>
        // 初始化数据库和 API
        let accountDB = null;
        
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // 初始化 IndexedDB
                await db.init();
                accountDB = db;
                console.log('✅ 数据库已就绪');
                
                // 从数据库加载账号
                await loadAccountsFromDB();
            } catch (error) {
                console.error('❌ 数据库初始化失败:', error);
                // 降级到 localStorage
                loadAccountsFromLocalStorage();
            }
        });
        
        // 模拟账号数据（演示用）
        const mockAccounts = [
            {
                id: 1,
                username: '@kohcun',
                platform: 'TikTok',
                country: '🇮🇩 印尼',
                followers: 150000,
                health: 95,
                status: 'normal',
                lastActive: '2026-03-18 06:00'
            },
            {
                id: 2,
                username: '@techbro_ph',
                platform: 'TikTok',
                country: '🇵🇭 菲律宾',
                followers: 80000,
                health: 78,
                status: 'warning',
                lastActive: '2026-03-17 22:00'
            },
            {
                id: 3,
                username: '@gadget_th',
                platform: 'TikTok',
                country: '🇹🇭 泰国',
                followers: 200000,
                health: 45,
                status: 'danger',
                lastActive: '2026-03-16 15:00'
            }
        ];
        
        // 渲染账号列表
        function renderAccounts() {
            const tbody = document.getElementById('accountsTableBody');
            tbody.innerHTML = '';
            
            mockAccounts.forEach(account => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${account.username}</strong></td>
                    <td>${account.platform}</td>
                    <td>${account.country}</td>
                    <td>${account.followers.toLocaleString()}</td>
                    <td>
                        <div class="health-bar">
                            <div class="health-fill" style="width: ${account.health}%"></div>
                        </div>
                        <small>${account.health}%</small>
                    </td>
                    <td>
                        <span class="status-badge status-${account.status}">
                            ${account.status === 'normal' ? '✅ 正常' : 
                              account.status === 'warning' ? '⚠️ 警告' : '❌ 异常'}
                        </span>
                    </td>
                    <td>${account.lastActive}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editAccount(${account.id})">编辑</button>
                        <button class="btn" onclick="checkHealth(${account.id})">检查</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            // 更新统计
            updateStats();
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalAccounts').textContent = mockAccounts.length;
            document.getElementById('healthyAccounts').textContent = mockAccounts.filter(a => a.status === 'normal').length;
            document.getElementById('warningAccounts').textContent = mockAccounts.filter(a => a.status === 'warning').length;
            document.getElementById('dangerAccounts').textContent = mockAccounts.filter(a => a.status === 'danger').length;
        }
        
        // 添加账号
        function showAddAccountModal() {
            alert('➕ 添加账号功能开发中...\n\n功能包括:\n- 批量导入账号\n- 自动检测账号状态\n- 配置紫鸟环境');
        }
        
        // 编辑账号
        function editAccount(id) {
            const account = mockAccounts.find(a => a.id === id);
            alert(`📝 编辑账号：${account.username}\n\n功能开发中...`);
        }
        
        // 检查健康
        function checkHealth(id) {
            const account = mockAccounts.find(a => a.id === id);
            alert(`🔍 检查账号健康：${account.username}\n\n当前健康度：${account.health}%\n\n详细报告功能开发中...`);
        }
        
        // 页面加载时渲染
        renderAccounts();
        
        // 🔍 搜索与过滤
        function filterAccounts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const platform = document.getElementById('platformFilter').value;
            const country = document.getElementById('countryFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            const filtered = mockAccounts.filter(account => {
                const matchSearch = account.username.toLowerCase().includes(search);
                const matchPlatform = !platform || account.platform === platform;
                const matchCountry = !country || account.country.includes(country);
                const matchStatus = !status || account.status === status;
                return matchSearch && matchPlatform && matchCountry && matchStatus;
            });
            
            renderFilteredAccounts(filtered);
        }
        
        // 渲染过滤后的账号
        function renderFilteredAccounts(accounts) {
            const tbody = document.getElementById('accountsTableBody');
            tbody.innerHTML = '';
            
            accounts.forEach(account => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" class="account-checkbox" value="${account.id}" onchange="updateSelectedCount()"></td>
                    <td><strong>${account.username}</strong></td>
                    <td>${account.platform}</td>
                    <td>${account.country}</td>
                    <td>${account.followers.toLocaleString()}</td>
                    <td>
                        <div class="health-bar">
                            <div class="health-fill" style="width: ${account.health}%"></div>
                        </div>
                        <small>${account.health}%</small>
                    </td>
                    <td>
                        <span class="status-badge status-${account.status}">
                            ${account.status === 'normal' ? '✅ 正常' : 
                              account.status === 'warning' ? '⚠️ 警告' : '❌ 异常'}
                        </span>
                    </td>
                    <td>${account.lastActive}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editAccount(${account.id})">编辑</button>
                        <button class="btn" onclick="checkHealth(${account.id})">检查</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        // 全选/取消全选
        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('.account-checkbox');
            checkboxes.forEach(cb => cb.checked = checkbox.checked);
            updateSelectedCount();
        }
        
        // 更新选中计数
        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.account-checkbox:checked');
            const count = checkboxes.length;
            document.getElementById('selectedCount').textContent = count;
            document.getElementById('batchActions').style.display = count > 0 ? 'block' : 'none';
        }
        
        // 批量导入
        function batchImport() {
            alert('📥 批量导入功能开发中...\n\n支持格式:\n- CSV 文件\n- Excel 文件\n- 复制粘贴\n\n字段：账号，平台，国家，备注');
        }
        
        // 导出账号
        function exportAccounts() {
            const data = mockAccounts.map(a => ({
                账号：a.username,
                平台：a.platform,
                国家：a.country,
                粉丝数：a.followers,
                健康度：a.health,
                状态：a.status
            }));
            
            const csv = Papa ? Papa.unparse(data) : JSON.stringify(data, null, 2);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `accounts_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            
            alert('✅ 已导出 ' + mockAccounts.length + ' 个账号');
        }
        
        // 批量检查健康
        function batchHealthCheck() {
            const checkboxes = document.querySelectorAll('.account-checkbox:checked');
            const count = checkboxes.length;
            alert('🔍 正在批量检查 ' + count + ' 个账号的健康状态...\n\n预计耗时：' + (count * 5) + '秒');
        }
        
        // 批量编辑
        function batchEdit() {
            const checkboxes = document.querySelectorAll('.account-checkbox:checked');
            const count = checkboxes.length;
            alert('✏️ 批量编辑 ' + count + ' 个账号\n\n功能开发中...');
        }
        
        // 批量删除
        function batchDelete() {
            const checkboxes = document.querySelectorAll('.account-checkbox:checked');
            const count = checkboxes.length;
            if (confirm('⚠️ 确定要删除 ' + count + ' 个账号吗？\n\n此操作不可恢复！')) {
                alert('✅ 已删除 ' + count + ' 个账号');
            }
        }
        
        // 添加账号模态框
        function showAddAccountModal() {
            alert('➕ 添加账号功能开发中...\n\n需要填写:\n- 账号名称\n- 平台\n- 国家\n- 备注\n- 紫鸟环境 ID');
        }
    </script>
</body>
</html>
