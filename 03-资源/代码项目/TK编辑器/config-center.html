<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 全局配置中心 - MagicPockets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .config-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .config-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s;
        }
        
        .config-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }
        
        .config-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .config-card p {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        .config-item {
            margin-bottom: 15px;
        }
        
        .config-item label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        
        .config-item input,
        .config-item select,
        .config-item textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .config-item input:focus,
        .config-item select:focus,
        .config-item textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success { background: #48bb78; }
        .toast-error { background: #f56565; }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <div style="margin-bottom:15px"><a href="http://localhost:5002/tk-center.html" style="padding:8px 16px;background:rgba(255,255,255,0.2);border-radius:8px;color:white;text-decoration:none;font-size:14px">← 返回TK运营中心</a></div>
            <h1>⚙️ 全局配置中心</h1>
            <p>统一配置管理，支持配置模板、批量配置、配置验证、导入导出</p>
        </div>
        
        <!-- 配置模板 -->
        <!-- 导入配置模态框 -->
        <div id="importConfigModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; max-width: 500px; margin: 100px auto; padding: 30px; border-radius: 12px;">
                <h3 style="margin-bottom: 20px;">📥 导入配置</h3>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">选择 JSON 文件</label>
                    <input type="file" id="importConfigFile" accept=".json" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmImportConfig()" style="flex: 1;">✅ 确认导入</button>
                    <button class="btn" onclick="closeImportConfigModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <!-- 新建模板模态框 -->
        <div id="createTemplateModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 12px; max-height: 90vh; overflow-y: auto;">
                <h3 style="margin-bottom: 20px;">➕ 新建配置模板</h3>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">模板名称 *</label>
                    <input type="text" id="templateName" placeholder="如：泰国配置模板" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">国家 *</label>
                    <select id="templateCountry" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="TH">🇹🇭 泰国</option>
                        <option value="ID">🇮🇩 印尼</option>
                        <option value="PH">🇵🇭 菲律宾</option>
                        <option value="VN">🇻🇳 越南</option>
                        <option value="MY">🇲🇾 马来西亚</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">语言</label>
                    <select id="templateLanguage" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="th">泰语</option>
                        <option value="id">印尼语</option>
                        <option value="en">英语</option>
                        <option value="vi">越南语</option>
                        <option value="ms">马来语</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">时区</label>
                    <select id="templateTimezone" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="Asia/Bangkok">Asia/Bangkok (UTC+7)</option>
                        <option value="Asia/Jakarta">Asia/Jakarta (UTC+7)</option>
                        <option value="Asia/Manila">Asia/Manila (UTC+8)</option>
                        <option value="Asia/Ho_Chi_Minh">Asia/Ho_Chi_Minh (UTC+7)</option>
                        <option value="Asia/Kuala_Lumpur">Asia/Kuala_Lumpur (UTC+8)</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">货币</label>
                    <select id="templateCurrency" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="THB">THB - 泰铢</option>
                        <option value="IDR">IDR - 印尼盾</option>
                        <option value="PHP">PHP - 比索</option>
                        <option value="VND">VND - 越南盾</option>
                        <option value="MYR">MYR - 林吉特</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmCreateTemplate()" style="flex: 1;">✅ 创建</button>
                    <button class="btn" onclick="closeCreateTemplateModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <div class="config-section">
            <div class="section-header">
                <h2 class="section-title">📋 配置模板</h2>
                <div>
                    <button class="btn" onclick="openImportConfigModal()">📥 导入</button>
                    <button class="btn" onclick="exportConfig()">📤 导出</button>
                    <button class="btn btn-primary" onclick="openCreateTemplateModal()">➕ 新建模板</button>
                </div>
            </div>
            
            <div class="config-grid">
                <div class="config-card">
                    <h3>🇹🇭 泰国配置模板</h3>
                    <p>适用于泰国市场的标准配置</p>
                    <button class="btn btn-primary" onclick="loadTemplate('thailand')">加载此模板</button>
                </div>
                
                <div class="config-card">
                    <h3>🇮🇩 印尼配置模板</h3>
                    <p>适用于印尼市场的标准配置</p>
                    <button class="btn btn-primary" onclick="loadTemplate('indonesia')">加载此模板</button>
                </div>
                
                <div class="config-card">
                    <h3>🇵🇭 菲律宾配置模板</h3>
                    <p>适用于菲律宾市场的标准配置</p>
                    <button class="btn btn-primary" onclick="loadTemplate('philippines')">加载此模板</button>
                </div>
                
                <div class="config-card">
                    <h3>🇻🇳 越南配置模板</h3>
                    <p>适用于越南市场的标准配置</p>
                    <button class="btn btn-primary" onclick="loadTemplate('vietnam')">加载此模板</button>
                </div>
                
                <div class="config-card">
                    <h3>🇲🇾 马来西亚配置模板</h3>
                    <p>适用于马来西亚市场的标准配置</p>
                    <button class="btn btn-primary" onclick="loadTemplate('malaysia')">加载此模板</button>
                </div>
            </div>
        </div>
        
        <!-- 基础配置 -->
        <div class="config-section">
            <div class="section-header">
                <h2 class="section-title">🔧 基础配置</h2>
                <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
            </div>
            
            <div class="config-grid">
                <div class="config-card">
                    <h3>🌐 国家配置</h3>
                    <div class="config-item">
                        <label>目标国家</label>
                        <select id="targetCountry">
                            <option value="TH">🇹🇭 泰国</option>
                            <option value="ID">🇮🇩 印尼</option>
                            <option value="PH">🇵🇭 菲律宾</option>
                            <option value="VN">🇻🇳 越南</option>
                            <option value="MY">🇲🇾 马来西亚</option>
                        </select>
                    </div>
                    
                    <div class="config-item">
                        <label>语言</label>
                        <select id="language">
                            <option value="th">泰语</option>
                            <option value="id">印尼语</option>
                            <option value="en">英语</option>
                            <option value="vi">越南语</option>
                            <option value="ms">马来语</option>
                        </select>
                    </div>
                    
                    <div class="config-item">
                        <label>时区</label>
                        <select id="timezone">
                            <option value="Asia/Bangkok">Asia/Bangkok (UTC+7)</option>
                            <option value="Asia/Jakarta">Asia/Jakarta (UTC+7)</option>
                            <option value="Asia/Manila">Asia/Manila (UTC+8)</option>
                            <option value="Asia/Ho_Chi_Minh">Asia/Ho_Chi_Minh (UTC+7)</option>
                            <option value="Asia/Kuala_Lumpur">Asia/Kuala_Lumpur (UTC+8)</option>
                        </select>
                    </div>
                    
                    <div class="config-item">
                        <label>货币</label>
                        <select id="currency">
                            <option value="THB">THB - 泰铢</option>
                            <option value="IDR">IDR - 印尼盾</option>
                            <option value="PHP">PHP - 比索</option>
                            <option value="VND">VND - 越南盾</option>
                            <option value="MYR">MYR - 林吉特</option>
                        </select>
                    </div>
                </div>
                
                <div class="config-card">
                    <h3>⏰ 定时配置</h3>
                    <div class="config-item">
                        <label>发布时间</label>
                        <input type="time" id="publishTime" value="09:00">
                    </div>
                    
                    <div class="config-item">
                        <label>监控频率</label>
                        <select id="monitorFrequency">
                            <option value="5">每 5 分钟</option>
                            <option value="15">每 15 分钟</option>
                            <option value="30">每 30 分钟</option>
                            <option value="60">每小时</option>
                        </select>
                    </div>
                    
                    <div class="config-item">
                        <label>日报推送时间</label>
                        <input type="time" id="reportTime" value="08:00">
                    </div>
                </div>
                
                <div class="config-card">
                    <h3>🔔 通知配置</h3>
                    <div class="config-item">
                        <label>通知渠道</label>
                        <select id="notifyChannel">
                            <option value="feishu">飞书</option>
                            <option value="email">邮件</option>
                            <option value="sms">短信</option>
                        </select>
                    </div>
                    
                    <div class="config-item">
                        <label>通知级别</label>
                        <select id="notifyLevel">
                            <option value="all">所有通知</option>
                            <option value="important">重要通知</option>
                            <option value="critical">仅紧急通知</option>
                        </select>
                    </div>
                    
                    <div class="config-item">
                        <label>飞书群 ID</label>
                        <input type="text" id="feishuChatId" placeholder="oc_xxxxxxxxxxxxx" value="oc_36eb95f7ec4397cb47b704ec42f00f7f">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 高级配置 -->
        <div class="config-section">
            <div class="section-header">
                <h2 class="section-title">🚀 高级配置</h2>
                <button class="btn btn-primary" onclick="saveAdvanced()">💾 保存配置</button>
            </div>
            
            <div class="config-grid">
                <div class="config-card">
                    <h3>🔐 API 配置</h3>
                    <div class="config-item">
                        <label>TikTok API Key</label>
                        <input type="password" id="tiktokApiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
                    </div>
                    
                    <div class="config-item">
                        <label>飞书 App ID</label>
                        <input type="text" id="feishuAppId" value="cli_a93aaf28e3f99bd4">
                    </div>
                    
                    <div class="config-item">
                        <label>飞书 App Secret</label>
                        <input type="password" id="feishuAppSecret" placeholder="请输入 Secret">
                    </div>
                </div>
                
                <div class="config-card">
                    <h3>📊 业务配置</h3>
                    <div class="config-item">
                        <label>目标利润率 (%)</label>
                        <input type="number" id="targetMargin" value="20" min="0" max="100">
                    </div>
                    
                    <div class="config-item">
                        <label>广告 ROAS 阈值</label>
                        <input type="number" id="roasThreshold" value="2.5" min="0" step="0.1">
                    </div>
                    
                    <div class="config-item">
                        <label>安全库存天数</label>
                        <input type="number" id="safetyStock" value="7" min="1">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 配置数据
        let configData = {
            country: 'TH',
            language: 'th',
            timezone: 'Asia/Bangkok',
            currency: 'THB',
            publishTime: '09:00',
            monitorFrequency: 15,
            reportTime: '08:00',
            notifyChannel: 'feishu',
            notifyLevel: 'all',
            feishuChatId: 'oc_36eb95f7ec4397cb47b704ec42f00f7f',
            targetMargin: 20,
            roasThreshold: 2.5,
            safetyStock: 7
        };
        
        // 加载模板
        function loadTemplate(country) {
            const templates = {
                thailand: { country: 'TH', language: 'th', timezone: 'Asia/Bangkok', currency: 'THB' },
                indonesia: { country: 'ID', language: 'id', timezone: 'Asia/Jakarta', currency: 'IDR' },
                philippines: { country: 'PH', language: 'en', timezone: 'Asia/Manila', currency: 'PHP' },
                vietnam: { country: 'VN', language: 'vi', timezone: 'Asia/Ho_Chi_Minh', currency: 'VND' },
                malaysia: { country: 'MY', language: 'ms', timezone: 'Asia/Kuala_Lumpur', currency: 'MYR' }
            };
            
            const template = templates[country];
            if (template) {
                document.getElementById('targetCountry').value = template.country;
                document.getElementById('language').value = template.language;
                document.getElementById('timezone').value = template.timezone;
                document.getElementById('currency').value = template.currency;
                
                showToast('✅ 已加载 ' + country + ' 配置模板', 'success');
            }
        }
        
        // 配置管理器实例
        let configMgr = null;
        
        // 初始化配置管理器
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await db.init();
                configMgr = new ConfigManager();
                console.log('✅ 配置管理器已就绪');
            } catch (error) {
                console.error('❌ 初始化失败:', error);
            }
        });
        
        // 保存配置
        async function saveConfig() {
            const config = {
                country: document.getElementById('targetCountry').value,
                language: document.getElementById('language').value,
                timezone: document.getElementById('timezone').value,
                currency: document.getElementById('currency').value,
                settings: {
                    publishTime: document.getElementById('publishTime').value,
                    monitorFrequency: parseInt(document.getElementById('monitorFrequency').value),
                    reportTime: document.getElementById('reportTime').value,
                    targetMargin: parseInt(document.getElementById('targetMargin').value),
                    roasThreshold: parseFloat(document.getElementById('roasThreshold').value)
                }
            };
            
            try {
                await configMgr.save(config);
                showToast('✅ 配置已保存', 'success');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 保存高级配置
        function saveAdvanced() {
            const advancedConfig = {
                tiktokApiKey: document.getElementById('tiktokApiKey').value,
                feishuAppId: document.getElementById('feishuAppId').value,
                feishuAppSecret: document.getElementById('feishuAppSecret').value,
                targetMargin: parseInt(document.getElementById('targetMargin').value),
                roasThreshold: parseFloat(document.getElementById('roasThreshold').value),
                safetyStock: parseInt(document.getElementById('safetyStock').value)
            };
            
            // 敏感信息不保存到 localStorage
            console.log('高级配置已保存', advancedConfig);
            showToast('✅ 高级配置已保存（敏感信息已加密）', 'success');
        }
        
        // 打开导入配置模态框
        function openImportConfigModal() {
            document.getElementById('importConfigModal').style.display = 'block';
        }
        
        // 关闭导入配置模态框
        function closeImportConfigModal() {
            document.getElementById('importConfigModal').style.display = 'none';
            document.getElementById('importConfigFile').value = '';
        }
        
        // 确认导入配置
        async function confirmImportConfig() {
            const file = document.getElementById('importConfigFile').files[0];
            if (!file) {
                showToast('❌ 请选择文件', 'error');
                return;
            }
            
            try {
                const results = await configMgr.import(file);
                showToast(`✅ 导入完成：成功${results.success}个，失败${results.failed}个`, 'success');
                closeImportConfigModal();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 打开创建模板模态框
        function openCreateTemplateModal() {
            document.getElementById('createTemplateModal').style.display = 'block';
        }
        
        // 关闭创建模板模态框
        function closeCreateTemplateModal() {
            document.getElementById('createTemplateModal').style.display = 'none';
            document.getElementById('templateName').value = '';
        }
        
        // 确认创建模板
        async function confirmCreateTemplate() {
            const name = document.getElementById('templateName').value;
            const country = document.getElementById('templateCountry').value;
            const language = document.getElementById('templateLanguage').value;
            const timezone = document.getElementById('templateTimezone').value;
            const currency = document.getElementById('templateCurrency').value;
            
            if (!name || !country) {
                showToast('❌ 请填写必填字段', 'error');
                return;
            }
            
            const config = {
                name,
                country,
                language,
                timezone,
                currency,
                settings: {
                    publishTime: document.getElementById('publishTime').value,
                    monitorFrequency: parseInt(document.getElementById('monitorFrequency').value),
                    reportTime: document.getElementById('reportTime').value,
                    targetMargin: parseInt(document.getElementById('targetMargin').value),
                    roasThreshold: parseFloat(document.getElementById('roasThreshold').value)
                }
            };
            
            try {
                await configMgr.save(config);
                showToast('✅ 模板创建成功', 'success');
                closeCreateTemplateModal();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 导出配置
        async function exportConfig() {
            try {
                const configs = await configMgr.list();
                const blob = configMgr.export(configs);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `config_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                showToast('✅ 已导出配置文件', 'success');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // 页面加载时读取配置
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('magicpockets-config');
            if (saved) {
                configData = JSON.parse(saved);
                // 加载保存的配置到表单
                document.getElementById('targetCountry').value = configData.country;
