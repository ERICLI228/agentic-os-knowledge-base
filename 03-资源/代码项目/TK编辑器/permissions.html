<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 权限管理 - MagicPockets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .user-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .user-table th,
        .user-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .user-table th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .role-admin { background: #fee2e2; color: #991b1b; }
        .role-manager { background: #fef3c7; color: #92400e; }
        .role-operator { background: #dbeafe; color: #1e40af; }
        .role-viewer { background: #d1fae5; color: #065f46; }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-active { background: #d1fae5; color: #065f46; }
        .status-inactive { background: #f3f4f6; color: #6b7280; }
        
        .permission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .permission-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
        }
        
        .permission-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .permission-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .permission-item input[type="checkbox"] {
            margin-right: 8px;
        }
        
        .audit-log {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-item {
            padding: 10px;
            border-left: 3px solid #667eea;
            background: #f9fafb;
            margin-bottom: 10px;
        }
        
        .log-time {
            font-size: 0.85em;
            color: #666;
        }
        
        .log-action {
            font-weight: 600;
            color: #333;
        }
        
        .log-user {
            font-size: 0.9em;
            color: #667eea;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success { background: #48bb78; }
        .toast-error { background: #f56565; }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← 返回首页</a>
        
        <div class="header">
            <h1>👥 权限管理</h1>
            <p>用户认证、角色权限、操作审计，保障系统安全</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">0</div>
                <div class="stat-label">活跃用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="adminUsers">0</div>
                <div class="stat-label">管理员</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="auditLogs">0</div>
                <div class="stat-label">审计日志</div>
            </div>
        </div>
        
        <!-- 添加/编辑用户模态框 -->
        <div id="userModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; max-width: 500px; margin: 50px auto; padding: 30px; border-radius: 12px; max-height: 90vh; overflow-y: auto;">
                <h3 style="margin-bottom: 20px;" id="modalTitle">➕ 添加用户</h3>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">用户名 *</label>
                    <input type="text" id="userUsername" placeholder="username" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">邮箱 *</label>
                    <input type="email" id="userEmail" placeholder="email@example.com" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">角色 *</label>
                    <select id="userRole" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="admin">👑 超级管理员</option>
                        <option value="manager">💼 运营经理</option>
                        <option value="operator">🔧 运营专员</option>
                        <option value="viewer">👁️ 访客</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">状态</label>
                    <select id="userStatus" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="active">✅ 活跃</option>
                        <option value="inactive">⚪ 未激活</option>
                    </select>
                </div>
                
                <div id="passwordField" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">密码</label>
                    <input type="password" id="userPassword" placeholder="至少 6 位" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmSaveUser()" style="flex: 1;">✅ 保存</button>
                    <button class="btn" onclick="closeUserModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <!-- 审计日志模态框 -->
        <div id="auditModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; max-width: 800px; margin: 50px auto; padding: 30px; border-radius: 12px; max-height: 90vh; overflow-y: auto;">
                <h3 style="margin-bottom: 20px;">📋 操作审计</h3>
                
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <select id="auditFilter" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="all">所有操作</option>
                        <option value="user.add">添加用户</option>
                        <option value="user.update">更新用户</option>
                        <option value="user.delete">删除用户</option>
                        <option value="user.login">登录</option>
                        <option value="user.logout">登出</option>
                    </select>
                    <button class="btn" onclick="exportAuditLogs()">📤 导出</button>
                </div>
                
                <div id="auditLogContainer" style="max-height: 400px; overflow-y: auto;">
                    <!-- 动态生成 -->
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="closeAuditModal()" style="width: 100%;">关闭</button>
                </div>
            </div>
        </div>
        
        <!-- 用户管理 -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">👥 用户管理</h2>
                <button class="btn btn-primary" onclick="openAddUserModal()">➕ 添加用户</button>
            </div>
            
            <table class="user-table">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>
        
        <!-- 角色权限 -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">🔐 角色权限</h2>
                <button class="btn btn-primary" onclick="savePermissions()">💾 保存权限</button>
            </div>
            
            <div class="permission-grid">
                <div class="permission-card">
                    <h4>👑 超级管理员</h4>
                    <div class="permission-item">
                        <input type="checkbox" checked disabled> <span>用户管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked disabled> <span>角色管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked disabled> <span>系统配置</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked disabled> <span>数据导出</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked disabled> <span>审计日志</span>
                    </div>
                </div>
                
                <div class="permission-card">
                    <h4>💼 运营经理</h4>
                    <div class="permission-item">
                        <input type="checkbox" checked> <span>用户管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>角色管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked> <span>系统配置</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked> <span>数据导出</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked> <span>审计日志</span>
                    </div>
                </div>
                
                <div class="permission-card">
                    <h4>🔧 运营专员</h4>
                    <div class="permission-item">
                        <input type="checkbox"> <span>用户管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>角色管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked> <span>系统配置</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" checked> <span>数据导出</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>审计日志</span>
                    </div>
                </div>
                
                <div class="permission-card">
                    <h4>👁️ 访客</h4>
                    <div class="permission-item">
                        <input type="checkbox"> <span>用户管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>角色管理</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>系统配置</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>数据导出</span>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox"> <span>审计日志</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 审计日志 -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">📋 操作审计</h2>
                <button class="btn" onclick="exportAuditLogs()">📤 导出日志</button>
            </div>
            
            <div class="audit-log" id="auditLogContainer">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
    
    <script>
        // 模拟用户数据
        const users = [
            { id: 1, username: 'admin', email: 'admin@magicpockets.com', role: 'admin', status: 'active', lastLogin: '2026-03-18 09:00' },
            { id: 2, username: 'eric', email: 'eric@magicpockets.com', role: 'manager', status: 'active', lastLogin: '2026-03-18 08:30' },
            { id: 3, username: 'operator1', email: 'op1@magicpockets.com', role: 'operator', status: 'active', lastLogin: '2026-03-17 18:00' },
            { id: 4, username: 'viewer1', email: 'view1@magicpockets.com', role: 'viewer', status: 'inactive', lastLogin: '2026-03-15 10:00' }
        ];
        
        // 模拟审计日志
        const auditLogs = [
            { id: 1, action: '用户登录', user: 'admin', time: '2026-03-18 09:00:00', details: '成功登录系统' },
            { id: 2, action: '修改配置', user: 'eric', time: '2026-03-18 08:45:00', details: '修改全局配置' },
            { id: 3, action: '添加账号', user: 'operator1', time: '2026-03-17 18:00:00', details: '添加 TikTok 账号 @kohcun' },
            { id: 4, action: '导出数据', user: 'eric', time: '2026-03-17 17:30:00', details: '导出运营报表' },
            { id: 5, action: '用户登录', user: 'viewer1', time: '2026-03-15 10:00:00', details: '成功登录系统' }
        ];
        
        // 权限管理器实例
        let permMgr = null;
        let editingUserId = null;
        
        // 初始化
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await db.init();
                permMgr = new PermissionManager();
                console.log('✅ 权限管理器已就绪');
                await loadUsersFromDB();
                await loadAuditLogs();
            } catch (error) {
                console.error('❌ 初始化失败:', error);
            }
        });
        
        // 从数据库加载用户
        async function loadUsersFromDB() {
            if (!permMgr) return;
            
            try {
                const users = await permMgr.listUsers();
                tbody.innerHTML = '';
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${user.username}</strong></td>
                        <td>${user.email}</td>
                        <td><span class="role-badge role-${user.role}">${getRoleName(user.role)}</span></td>
                        <td><span class="status-badge status-${user.status}">${user.status === 'active' ? '✅ 活跃' : '⚪ 未激活'}</span></td>
                        <td>${new Date(user.createdAt).toLocaleString('zh-CN')}</td>
                        <td>
                            <button class="btn btn-primary" onclick="openEditUserModal('${user.id}')">✏️ 编辑</button>
                            <button class="btn" onclick="openAuditModal('${user.id}')">📋 审计</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                updateStats();
            } catch (error) {
                console.error('加载用户失败:', error);
            }
        }
        
        // 打开添加用户模态框
        function openAddUserModal() {
            editingUserId = null;
            document.getElementById('modalTitle').textContent = '➕ 添加用户';
            document.getElementById('passwordField').style.display = 'block';
            document.getElementById('userUsername').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userRole').value = 'admin';
            document.getElementById('userStatus').value = 'active';
            document.getElementById('userPassword').value = '';
            document.getElementById('userModal').style.display = 'block';
        }
        
        // 打开编辑用户模态框
        async function openEditUserModal(userId) {
            editingUserId = userId;
            const user = await permMgr.getUser(userId);
            
            document.getElementById('modalTitle').textContent = '✏️ 编辑用户';
            document.getElementById('passwordField').style.display = 'none';
            document.getElementById('userUsername').value = user.username;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userRole').value = user.role;
            document.getElementById('userStatus').value = user.status;
            document.getElementById('userModal').style.display = 'block';
        }
        
        // 关闭用户模态框
        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
            editingUserId = null;
        }
        
        // 确认保存用户
        async function confirmSaveUser() {
            const username = document.getElementById('userUsername').value;
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('userRole').value;
            const status = document.getElementById('userStatus').value;
            const password = document.getElementById('userPassword').value;
            
            // 验证
            if (!username || username.length < 3) {
                showToast('❌ 用户名至少 3 个字符', 'error');
                return;
            }
            
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('❌ 邮箱格式不正确', 'error');
                return;
            }
            
            if (!editingUserId && password.length < 6) {
                showToast('❌ 密码至少 6 位', 'error');
                return;
            }
            
            try {
                if (editingUserId) {
                    // 更新用户
                    await permMgr.updateUser(editingUserId, { username, email, role, status });
                    showToast('✅ 用户已更新', 'success');
                } else {
                    // 添加用户
                    await permMgr.addUser({ username, email, role, status, password });
                    showToast('✅ 用户已添加', 'success');
                }
                
                closeUserModal();
                await loadUsersFromDB();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 打开审计模态框
        async function openAuditModal(userId) {
            document.getElementById('auditModal').style.display = 'block';
            await loadAuditLogs(userId);
        }
        
        // 关闭审计模态框
        function closeAuditModal() {
            document.getElementById('auditModal').style.display = 'none';
        }
        
        // 加载审计日志
        async function loadAuditLogs(userId = null) {
            if (!permMgr) return;
            
            try {
                const filters = userId ? { userId } : {};
                const actionFilter = document.getElementById('auditFilter').value;
                if (actionFilter !== 'all') {
                    filters.action = actionFilter;
                }
                
                const logs = await permMgr.getAuditLogs(filters);
                const container = document.getElementById('auditLogContainer');
                container.innerHTML = '';
                
                logs.forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.innerHTML = `
                        <div class="log-time">${new Date(log.timestamp).toLocaleString('zh-CN')}</div>
                        <div class="log-action">${log.action}</div>
                        <div class="log-user">用户：${log.userId}</div>
                        <div style="color: #666; font-size: 0.9em;">${JSON.stringify(log.details || {})}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('加载审计日志失败:', error);
            }
        }
        
        // 导出审计日志
        async function exportAuditLogs() {
            console.log('📤 开始导出审计日志...');
            
            if (!permMgr) {
                showToast('❌ 权限管理器未初始化', 'error');
                return;
            }
            
            try {
                const actionFilter = document.getElementById('auditFilter').value;
                const filters = actionFilter !== 'all' ? { action: actionFilter } : {};
                const logs = await permMgr.getAuditLogs(filters);
                
                console.log('📊 获取到日志数量:', logs.length);
                
                if (logs.length === 0) {
                    showToast('⚠️ 没有可导出的日志', 'warning');
                    return;
                }
                
                // 生成 CSV
                const headers = ['timestamp', 'userId', 'action', 'resource', 'status', 'details'];
                const csv = [
                    headers.join(','),
                    ...logs.map(log => 
                        headers.map(h => {
                            let value = log[h] || '';
                            if (typeof value === 'object') {
                                value = JSON.stringify(value);
                            }
                            // 处理包含逗号或引号的字段
                            if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) {
                                return `"${value.replace(/"/g, '""')}"`;
                            }
                            return value;
                        }).join(',')
                    )
                ].join('\n');
                
                console.log('📄 CSV 内容:', csv.substring(0, 200) + '...');
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                console.log('🔗 创建下载链接:', url);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `audit_logs_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // 清理 URL
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                }, 100);
                
                showToast(`✅ 已导出 ${logs.length} 条日志`, 'success');
            } catch (error) {
                console.error('❌ 导出失败:', error);
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 监听审计过滤器变化
        document.getElementById('auditFilter').addEventListener('change', () => {
            loadAuditLogs();
        });
        
        // 渲染用户列表
        const tbody = document.getElementById('usersTableBody');
        function renderUsers() {
            loadUsersFromDB();
        }
        
        // 渲染审计日志
        function renderAuditLogs() {
            const container = document.getElementById('auditLogContainer');
            container.innerHTML = '';
            
            auditLogs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div class="log-time">${log.time}</div>
                    <div class="log-action">${log.action}</div>
                    <div class="log-user">操作人：${log.user}</div>
                    <div style="color: #666; font-size: 0.9em;">${log.details}</div>
                `;
                container.appendChild(div);
            });
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.status === 'active').length;
            document.getElementById('adminUsers').textContent = users.filter(u => u.role === 'admin').length;
            document.getElementById('auditLogs').textContent = auditLogs.length;
        }
        
        // 获取角色名称
        function getRoleName(role) {
            const roles = {
                'admin': '👑 超级管理员',
                'manager': '💼 运营经理',
                'operator': '🔧 运营专员',
                'viewer': '👁️ 访客'
            };
            return roles[role] || role;
        }
        
        // 添加用户
        function showAddUserModal() {
            alert('➕ 添加用户功能开发中...\n\n需要填写:\n- 用户名\n- 邮箱\n- 密码\n- 角色\n- 状态');
        }
        
        // 编辑用户
        function editUser(id) {
            const user = users.find(u => u.id === id);
            alert(`📝 编辑用户：${user.username}\n\n功能开发中...`);
        }
        
        // 查看审计
        function viewAudit(id) {
            alert('📋 查看用户审计日志\n\n功能开发中...');
        }
        
        // 保存权限
        function savePermissions() {
            showToast('✅ 权限配置已保存', 'success');
        }
        
        // 导出审计日志
        function exportAuditLogs() {
            showToast('📤 审计日志已导出', 'success');
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // 页面加载时渲染
        renderUsers();
        renderAuditLogs();
    </script>
</body>
</html>
