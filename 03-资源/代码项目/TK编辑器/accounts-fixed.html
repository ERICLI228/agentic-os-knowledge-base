<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 账号管理中心 - MagicPockets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .accounts-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .account-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .account-table th,
        .account-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .account-table th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-normal { background: #d4edda; color: #155724; }
        .status-warning { background: #fff3cd; color: #856404; }
        .status-danger { background: #f8d7da; color: #721c24; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal.active {
            display: flex !important;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            border-radius: 12px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success { background: #48bb78; }
        .toast-error { background: #f56565; }
        .toast-warning { background: #ffc107; color: #000; }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <div style="margin-bottom:15px"><a href="http://localhost:5002/tk-center.html" style="padding:8px 16px;background:rgba(255,255,255,0.2);border-radius:8px;color:white;text-decoration:none;font-size:14px">← 返回TK运营中心</a></div>
            <h1>🔐 账号管理中心</h1>
            <p>集中管理 TikTok 多账号、多国家配置，监控账号健康状态，支持批量操作</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalAccounts">0</div>
                <div class="stat-label">总账号数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="healthyAccounts">0</div>
                <div class="stat-label">健康账号</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="warningAccounts">0</div>
                <div class="stat-label">警告账号</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="dangerAccounts">0</div>
                <div class="stat-label">异常账号</div>
            </div>
        </div>
        
        <!-- 添加账号模态框 -->
        <div id="addAccountModal" class="modal">
            <div class="modal-content">
                <h3 style="margin-bottom: 20px;">➕ 添加账号</h3>
                
                <div class="form-group">
                    <label>账号名称 *</label>
                    <input type="text" id="addUsername" placeholder="@username">
                </div>
                
                <div class="form-group">
                    <label>平台 *</label>
                    <select id="addPlatform">
                        <option value="TikTok">TikTok</option>
                        <option value="Shopee">Shopee</option>
                        <option value="Lazada">Lazada</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>国家 *</label>
                    <select id="addCountry">
                        <option value="TH">🇹🇭 泰国</option>
                        <option value="ID">🇮🇩 印尼</option>
                        <option value="PH">🇵🇭 菲律宾</option>
                        <option value="VN">🇻🇳 越南</option>
                        <option value="MY">🇲🇾 马来西亚</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>粉丝数</label>
                    <input type="number" id="addFollowers" placeholder="0">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmAddAccount()" style="flex: 1;">✅ 确认添加</button>
                    <button class="btn" onclick="closeAddAccountModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <!-- 批量导入模态框 -->
        <div id="importModal" class="modal">
            <div class="modal-content">
                <h3 style="margin-bottom: 20px;">📥 批量导入账号</h3>
                
                <div class="form-group">
                    <label>上传 CSV 文件</label>
                    <input type="file" id="importFile" accept=".csv">
                    <p style="font-size: 12px; color: #666; margin-top: 5px;">格式：username,platform,country,followers</p>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="confirmImport()" style="flex: 1;">✅ 确认导入</button>
                    <button class="btn" onclick="closeImportModal()" style="flex: 1;">❌ 取消</button>
                </div>
            </div>
        </div>
        
        <!-- 账号列表 -->
        <div class="accounts-section">
            <div class="section-header">
                <h2>📋 账号列表</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="openImportModal()">📥 批量导入</button>
                    <button class="btn" onclick="exportAccounts()">📤 导出</button>
                    <button class="btn btn-primary" onclick="openAddAccountModal()">➕ 添加账号</button>
                </div>
            </div>
            
            <table class="account-table">
                <thead>
                    <tr>
                        <th>账号</th>
                        <th>平台</th>
                        <th>国家</th>
                        <th>粉丝数</th>
                        <th>健康度</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="accountsTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 引入数据库和账号管理器 -->
    <script src="js/database.js"></script>
    <script src="js/account-manager.js"></script>
    
    <script>
        let accountMgr = null;
        let mockAccounts = [];
        
        // 页面加载
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('📊 页面加载完成');
            try {
                await db.init();
                accountMgr = new AccountManager();
                console.log('✅ 数据库和账号管理器已就绪');
                await loadAccounts();
            } catch (error) {
                console.error('❌ 初始化失败:', error);
                showToast('❌ 初始化失败：' + error.message, 'error');
            }
        });
        
        // 加载账号
        async function loadAccounts() {
            if (!accountMgr) return;
            
            try {
                const accounts = await accountMgr.list();
                mockAccounts = accounts;
                renderAccounts();
            } catch (error) {
                console.error('加载账号失败:', error);
            }
        }
        
        // 渲染账号列表
        function renderAccounts() {
            const tbody = document.getElementById('accountsTableBody');
            tbody.innerHTML = '';
            
            mockAccounts.forEach(acc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${acc.username}</strong></td>
                    <td>${acc.platform}</td>
                    <td>${acc.country}</td>
                    <td>${(acc.followers || 0).toLocaleString()}</td>
                    <td>${acc.health || 100}%</td>
                    <td><span class="status-badge status-${acc.status || 'normal'}">${acc.status === 'danger' ? '❌ 异常' : acc.status === 'warning' ? '⚠️ 警告' : '✅ 正常'}</span></td>
                    <td>
                        <button class="btn btn-primary" onclick="editAccount('${acc.id}')">✏️ 编辑</button>
                        <button class="btn" onclick="deleteAccount('${acc.id}')" style="background: #f56565; color: white;">🗑️ 删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            updateStats();
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalAccounts').textContent = mockAccounts.length;
            document.getElementById('healthyAccounts').textContent = mockAccounts.filter(a => a.status === 'normal').length;
            document.getElementById('warningAccounts').textContent = mockAccounts.filter(a => a.status === 'warning').length;
            document.getElementById('dangerAccounts').textContent = mockAccounts.filter(a => a.status === 'danger').length;
        }
        
        // 打开添加账号模态框
        function openAddAccountModal() {
            console.log('🔴 打开添加账号模态框');
            document.getElementById('addUsername').value = '';
            document.getElementById('addPlatform').value = 'TikTok';
            document.getElementById('addCountry').value = 'TH';
            document.getElementById('addFollowers').value = '';
            document.getElementById('addAccountModal').classList.add('active');
        }
        
        // 关闭添加账号模态框
        function closeAddAccountModal() {
            document.getElementById('addAccountModal').classList.remove('active');
        }
        
        // 确认添加账号
        async function confirmAddAccount() {
            const username = document.getElementById('addUsername').value;
            const platform = document.getElementById('addPlatform').value;
            const country = document.getElementById('addCountry').value;
            const followers = parseInt(document.getElementById('addFollowers').value) || 0;
            
            console.log('📝 添加账号:', { username, platform, country, followers });
            
            if (!username || !username.startsWith('@')) {
                showToast('❌ 账号格式错误，应以@开头', 'error');
                return;
            }
            
            try {
                await accountMgr.add({ username, platform, country, followers });
                showToast('✅ 账号添加成功', 'success');
                closeAddAccountModal();
                await loadAccounts();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 打开导入模态框
        function openImportModal() {
            console.log('🔴 打开导入模态框');
            document.getElementById('importFile').value = '';
            document.getElementById('importModal').classList.add('active');
        }
        
        // 关闭导入模态框
        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
        }
        
        // 确认导入
        async function confirmImport() {
            const file = document.getElementById('importFile').files[0];
            if (!file) {
                showToast('❌ 请选择文件', 'error');
                return;
            }
            
            console.log('📥 导入文件:', file.name);
            
            try {
                const results = await accountMgr.batchImport(file);
                console.log('📊 导入结果:', results);
                showToast(`✅ 导入完成：成功${results.success}个，失败${results.failed}个`, 'success');
                closeImportModal();
                await loadAccounts();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 导出账号
        async function exportAccounts() {
            console.log('📤 开始导出账号...');
            
            if (!accountMgr) {
                showToast('❌ 账号管理器未初始化', 'error');
                return;
            }
            
            try {
                const accounts = await accountMgr.list();
                
                if (accounts.length === 0) {
                    showToast('⚠️ 没有可导出的账号', 'warning');
                    return;
                }
                
                // 生成 CSV
                const headers = ['username', 'platform', 'country', 'followers', 'health', 'status'];
                const csv = [
                    headers.join(','),
                    ...accounts.map(acc => 
                        headers.map(h => acc[h] || '').join(',')
                    )
                ].join('\n');
                
                console.log('📄 CSV 内容:', csv.substring(0, 200));
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                
                // 创建下载链接
                const a = document.createElement('a');
                a.href = url;
                a.download = `accounts_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                
                // 清理
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
                
                showToast(`✅ 已导出 ${accounts.length} 个账号`, 'success');
            } catch (error) {
                console.error('❌ 导出失败:', error);
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 编辑账号
        async function editAccount(id) {
            const account = await accountMgr.get(id);
            if (!account) return;
            
            openAddAccountModal();
            document.getElementById('addUsername').value = account.username;
            document.getElementById('addPlatform').value = account.platform;
            document.getElementById('addCountry').value = account.country;
            document.getElementById('addFollowers').value = account.followers || 0;
        }
        
        // 删除账号
        async function deleteAccount(id) {
            if (!confirm('确定要删除这个账号吗？')) return;
            
            try {
                await accountMgr.delete(id);
                showToast('✅ 账号已删除', 'success');
                await loadAccounts();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
